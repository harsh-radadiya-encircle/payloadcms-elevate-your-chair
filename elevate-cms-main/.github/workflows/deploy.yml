name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 165.22.29.5 >> ~/.ssh/known_hosts

      - name: Pull & Deploy
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          eval "$(ssh-agent -a $SSH_AUTH_SOCK)"
          ssh-add ~/.ssh/id_ed25519

          ssh -o StrictHostKeyChecking=no root@165.22.29.5 << 'EOF'
            cd /var/www/the-cole-cms
            git pull origin main
            npm install
            npm run build
            pm2 restart the-cole
          EOF
