<!DOCTYPE html>
<html>
<head>
<style>
.btn-52 {
    position: relative;
    display: inline-block;
    padding: 15px 30px;
    font-size: 16px;
    background: transparent;
    cursor: pointer;
    border: none;
}
.btn-52 svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
.btn-52 svg rect {
    stroke-width: 4;
    stroke: #ff9800;
    transition: all 600ms ease;
    stroke-dasharray: 100 0;
    stroke-dashoffset: 0;
}
.btn-52:hover svg rect {
    stroke-dasharray: 18 84;
    stroke-dashoffset: 46;
}
</style>
</head>
<body style="padding: 50px; background: #222;">
    <button class="btn-52">
        <svg xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="100%" height="100%" fill="none" pathLength="100" />
        </svg>
        <span style="color: white; position: relative;">DYNAMIC BUTTON</span>
    </button>
</body>
</html>
